spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.kafka.annotation.KafkaAnnotationDrivenConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.data.mongodb.repository.config.MongoRepositoriesAutoConfiguration

  data:
    mongodb:
      host: localhost
      port: 27017
      username: test
      password: test
      database: test
      authentication-database: admin

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group

server:
  port: 0